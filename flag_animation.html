<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      background: transparent;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 0 48px;
    }

    .flag-wrap {
      position: relative;
      width: 140px;
      height: 200px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .sparks {
      position: absolute;
      top: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 60px;
      opacity: 0;
      animation: sparksAppear 0.2s ease 0.85s forwards;
    }

    .spark {
      position: absolute;
      background: #ffffff;
      border-radius: 4px;
      transform-origin: bottom center;
      opacity: 0;
      animation: sparkBlink 1.4s ease-in-out infinite;
    }

    .spark-left {
      width: 3px; height: 20px;
      left: 4px; top: 20px;
      transform: rotate(-38deg);
      animation-delay: 0.9s;
    }

    .spark-mid {
      width: 3px; height: 26px;
      left: 53px; top: 6px;
      animation-delay: 1.08s;
    }

    .spark-right {
      width: 3px; height: 20px;
      left: 102px; top: 20px;
      transform: rotate(38deg);
      animation-delay: 1.24s;
    }

    @keyframes sparksAppear {
      to { opacity: 1; }
    }

    @keyframes sparkBlink {
      0%, 100% { opacity: 0; }
      35%       { opacity: 1; }
      65%       { opacity: 0.5; }
      85%       { opacity: 0; }
    }

    .pole {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%) scaleY(0);
      transform-origin: bottom center;
      width: 5px;
      height: 120px;
      background: #0E9F93;
      border-radius: 3px;
      animation: poleDown 0.45s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    @keyframes poleDown {
      from { transform: translateX(-50%) scaleY(0); }
      to   { transform: translateX(-50%) scaleY(1); }
    }

    .flag {
      position: absolute;
      bottom: 80px;
      left: calc(50% + 3px);
      width: 0;
      height: 0;
      border-top: 0px solid transparent;
      border-bottom: 0px solid transparent;
      border-left: 0px solid #FF5C5C;
      transform-origin: left center;
      animation: flagUnfurl 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards;
    }

    @keyframes flagUnfurl {
      from {
        border-top-width: 0;
        border-bottom-width: 0;
        border-left-width: 0;
      }
      to {
        border-top-width: 26px;
        border-bottom-width: 26px;
        border-left-width: 50px;
      }
    }

    .replay-btn {
      margin-top: 24px;
      padding: 6px 18px;
      border-radius: 20px;
      border: 1px solid #ccc;
      background: transparent;
      color: #666;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .replay-btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <div class="scene">
    <div class="flag-wrap" id="flagWrap">
      <div class="sparks">
        <div class="spark spark-left"></div>
        <div class="spark spark-mid"></div>
        <div class="spark spark-right"></div>
      </div>
      <div class="pole"></div>
      <div class="flag"></div>
    </div>
    <button class="replay-btn" onclick="replay()">重播</button>
  </div>

  <script>
    function replay() {
      document.querySelectorAll('.pole, .flag, .sparks, .spark').forEach(el => {
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = '';
      });
    }
  </script>
</body>
</html>
